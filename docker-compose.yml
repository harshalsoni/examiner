services:
  examiner:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_SHA: ${GITHUB_SHA:-development}
    ports:
      - "3030:3030"
    environment:
      - RUST_LOG=info
      - PORT=3030
      - EXPIRY_DAYS=1
      - SQLITE_URI=sqlite:///data/examiner.db
    volumes:
      - examiner-data:/data

volumes:
  examiner-data:
